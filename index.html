  <body class="h-dvh overflow-hidden">

          class="w-full h-full object-cover"
        />

      <!-- Right Side - Content -->
       <div class="gradient-bg-image h-full w-[48%] p-24 pt-[13%]">

        <div class="text-white mr-12 pl-[10%] mt-0">

            <h1 class="text-4xl font-bold leading-tight text-shadow ">

                but we're already open for business!<br />

                <p class="text-lg font-semibold italic text-shadow">
                    Drop Us a Message
                </p>
                <p class="text-sm text-shadow -mt-1">
                    | We reply faster than a laptop restart!
                </p>
            </div>
            
            <!-- Email -->
            <div class="pt-4">
                <a 
                    href="mailto:talk@inspler.com" 
                    target="_blank"
                    class="text-2xl  font-bold underline hover:text-gray-300 transition-all duration-300 inline-block text-shadow"
                >
                    talk@inspler.com
                </a>
            </div>
